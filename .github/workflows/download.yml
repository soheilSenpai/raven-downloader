name: دانلود و آرشیو فایل (Raven)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل (Direct URL)'
        required: true
        type: string
      file_rename:
        description: 'نام دلخواه برای فایل با پسوند (اختیاری)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  download-and-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 بررسی دسترسی به مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📦 نصب ابزارهای لازم
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full wget aria2 python3-pip
          pip3 install requests --quiet

      - name: 🔍 استخراج نام فایل از لینک
        id: filename
        run: |
          URL="${{ github.event.inputs.file_url }}"
          
          # حذف query string و fragment
          CLEAN_URL="${URL%%\?*}"
          CLEAN_URL="${CLEAN_URL%%#*}"
          
          RAW_NAME=$(basename "$CLEAN_URL" | tr -d '\r\n')
          
          if [[ -z "$RAW_NAME" || "$RAW_NAME" == "/" ]]; then
            RAW_NAME="downloaded_file"
          fi
          
          EXT="${RAW_NAME##*.}"
          if [[ "$EXT" == "$RAW_NAME" ]]; then
            EXT=""
          fi
          BASE="${RAW_NAME%.*}"
          
          echo "raw_name=$RAW_NAME" >> $GITHUB_OUTPUT
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "ext=$EXT" >> $GITHUB_OUTPUT
          
          echo "📋 نام اصلی فایل: $RAW_NAME"

      - name: ⬇️ دانلود فایل (روش چندگانه)
        id: download
        run: |
          RAW_NAME="${{ steps.filename.outputs.raw_name }}"
          URL="${{ github.event.inputs.file_url }}"
          
          # استخراج دامنه
          DOMAIN=$(echo "$URL" | awk -F/ '{printf "%s//%s", $1, $3}')
          
          echo "=============================================="
          echo "🔗 لینک: $URL"
          echo "🌐 دامنه: $DOMAIN"
          echo "📄 نام فایل: $RAW_NAME"
          echo "=============================================="
          
          download_success=false
          
          # روش ۱: Python requests (انعطاف‌پذیرترین)
          echo "🟡 روش ۱: تلاش با Python requests..."
          python3 << PYEOF
          import requests
          import sys
          
          url = "$URL"
          output = "$RAW_NAME"
          domain = "$DOMAIN"
          
          session = requests.Session()
          session.headers.update({
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "*/*",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": f"{domain}/",
              "Origin": domain,
              "Connection": "keep-alive",
              "Sec-Fetch-Dest": "empty",
              "Sec-Fetch-Mode": "cors",
              "Sec-Fetch-Site": "same-origin",
          })
          
          try:
              # First request to get cookies
              r = session.get(url, allow_redirects=True, timeout=30, stream=True)
              r.raise_for_status()
              
              total_size = 0
              with open(output, 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      if chunk:
                          f.write(chunk)
                          total_size += len(chunk)
              
              print(f"✅ Python: دانلود موفق - {total_size} bytes")
              sys.exit(0)
          except Exception as e:
              print(f"❌ Python: خطا - {e}")
              sys.exit(1)
          PYEOF
          
          if [[ $? -eq 0 ]] && [[ -f "$RAW_NAME" ]] && [[ $(stat -c %s "$RAW_NAME" 2>/dev/null || echo 0) -gt 1000 ]]; then
            download_success=true
          fi
          
          # روش ۲: curl با تنظیمات کامل
          if [[ "$download_success" == "false" ]]; then
            echo "🟡 روش ۲: تلاش با curl..."
            rm -f "$RAW_NAME"
            curl -v -L --fail --retry 5 --retry-delay 10 \
                 --connect-timeout 30 --max-time 1200 \
                 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 -H "Accept: */*" \
                 -H "Accept-Language: en-US,en;q=0.9" \
                 -H "Referer: $DOMAIN/" \
                 -H "Origin: $DOMAIN" \
                 -H "Connection: keep-alive" \
                 -H "Sec-Fetch-Dest: empty" \
                 -H "Sec-Fetch-Mode: cors" \
                 -H "Sec-Fetch-Site: same-origin" \
                 -c cookies.txt -b cookies.txt \
                 -o "$RAW_NAME" \
                 "$URL" 2>&1 | tail -20
            
            if [[ -f "$RAW_NAME" ]] && [[ $(stat -c %s "$RAW_NAME" 2>/dev/null || echo 0) -gt 1000 ]]; then
              download_success=true
            fi
          fi
          
          # روش ۳: aria2
          if [[ "$download_success" == "false" ]]; then
            echo "🟡 روش ۳: تلاش با aria2..."
            rm -f "$RAW_NAME"
            aria2c -x 4 -s 4 --retry-wait=10 --max-tries=5 \
                   --timeout=30 --max-file-not-found=5 --allow-overwrite=true \
                   --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                   --header="Referer: $DOMAIN/" \
                   --header="Origin: $DOMAIN" \
                   --out="$RAW_NAME" "$URL"
            
            if [[ -f "$RAW_NAME" ]] && [[ $(stat -c %s "$RAW_NAME" 2>/dev/null || echo 0) -gt 1000 ]]; then
              download_success=true
            fi
          fi
          
          # روش ۴: wget
          if [[ "$download_success" == "false" ]]; then
            echo "🟡 روش ۴: تلاش با wget..."
            rm -f "$RAW_NAME"
            wget --tries=5 --timeout=30 --waitretry=10 \
                 --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 --referer="$DOMAIN/" \
                 --header="Origin: $DOMAIN" \
                 --keep-session-cookies --save-cookies cookies.txt --load-cookies cookies.txt \
                 -O "$RAW_NAME" "$URL"
            
            if [[ -f "$RAW_NAME" ]] && [[ $(stat -c %s "$RAW_NAME" 2>/dev/null || echo 0) -gt 1000 ]]; then
              download_success=true
            fi
          fi
          
          # بررسی نهایی
          if [[ "$download_success" == "false" ]]; then
            echo "❌ همه روش‌های دانلود شکست خوردند!"
            echo "💡 نکته: ممکن است لینک نیاز به مرورگر واقعی داشته باشد."
            echo "💡 لینک را در مرورگر تست کنید و لینک مستقیم (Direct URL) را از Network Tab استخراج کنید."
            exit 1
          fi
          
          SIZE=$(stat -c %s "$RAW_NAME" 2>/dev/null || echo "0")
          SIZE_MB=$(( SIZE / 1048576 ))
          echo "✅ دانلود موفق: $RAW_NAME (${SIZE_MB}MB)"
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: 🏷️ تعیین نام نهایی فایل
        id: naming
        run: |
          RAW_NAME="${{ steps.filename.outputs.raw_name }}"
          BASE="${{ steps.filename.outputs.base }}"
          EXT="${{ steps.filename.outputs.ext }}"
          CUSTOM_NAME="${{ github.event.inputs.file_rename }}"
          
          if [[ -n "$CUSTOM_NAME" ]]; then
            FINAL_NAME="Raven_${CUSTOM_NAME}"
            if [[ "$CUSTOM_NAME" == *.* ]]; then
              ARCHIVE_BASE="Raven_${CUSTOM_NAME%.*}"
            else
              ARCHIVE_BASE="Raven_${CUSTOM_NAME}"
            fi
          else
            FINAL_NAME="Raven_${RAW_NAME}"
            ARCHIVE_BASE="Raven_${BASE}"
          fi
          
          echo "final_name=$FINAL_NAME" >> $GITHUB_OUTPUT
          echo "archive_base=$ARCHIVE_BASE" >> $GITHUB_OUTPUT

      - name: ✏️ تغییر نام فایل
        run: |
          RAW_NAME="${{ steps.filename.outputs.raw_name }}"
          FINAL_NAME="${{ steps.naming.outputs.final_name }}"
          mv "$RAW_NAME" "$FINAL_NAME"

      - name: 🗜️ ساخت آرشیو
        run: |
          ARCHIVE_BASE="${{ steps.naming.outputs.archive_base }}"
          FINAL_NAME="${{ steps.naming.outputs.final_name }}"
          
          7z a -mx=1 -v95m "${ARCHIVE_BASE}.7z" "$FINAL_NAME"

      - name: 📁 سازمان‌دهی فایل‌ها
        id: organize
        run: |
          ARCHIVE_BASE="${{ steps.naming.outputs.archive_base }}"
          
          CHUNK_COUNT=$(ls "${ARCHIVE_BASE}.7z."* 2>/dev/null | wc -l)
          
          if [[ $CHUNK_COUNT -eq 1 ]] && [[ -f "${ARCHIVE_BASE}.7z.001" ]]; then
            mv "${ARCHIVE_BASE}.7z.001" "${ARCHIVE_BASE}.7z"
            echo "is_multi=false" >> $GITHUB_OUTPUT
          elif [[ $CHUNK_COUNT -gt 1 ]]; then
            FOLDER_NAME="${ARCHIVE_BASE}"
            if [[ -d "$FOLDER_NAME" ]]; then
              FOLDER_NAME="${ARCHIVE_BASE}_files"
            fi
            mkdir -p "$FOLDER_NAME"
            mv "${ARCHIVE_BASE}.7z."* "$FOLDER_NAME/" 2>/dev/null || true
            echo "is_multi=true" >> $GITHUB_OUTPUT
            echo "folder=$FOLDER_NAME" >> $GITHUB_OUTPUT
          else
            echo "is_multi=false" >> $GITHUB_OUTPUT
          fi

      - name: 🗑️ حذف فایل اصلی
        run: |
          rm -f "${{ steps.naming.outputs.final_name }}"

      - name: ⚙️ تنظیمات Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: ⬆️ آپلود به مخزن
        run: |
          IS_MULTI="${{ steps.organize.outputs.is_multi }}"
          ARCHIVE_BASE="${{ steps.naming.outputs.archive_base }}"
          FOLDER="${{ steps.organize.outputs.folder }}"
          
          if [[ "$IS_MULTI" == "true" ]]; then
            git add "$FOLDER/"
          else
            git add "${ARCHIVE_BASE}.7z"
          fi
          
          if ! git diff --staged --quiet; then
            git commit -m "📦 Raven: ${ARCHIVE_BASE}"
            git push origin HEAD
          else
            echo "⚠️ هیچ فایلی stage نشده!"
            exit 1
          fi

      - name: 🎉 گزارش نهایی
        run: |
          ARCHIVE_BASE="${{ steps.naming.outputs.archive_base }}"
          FOLDER="${{ steps.organize.outputs.folder }}"
          IS_MULTI="${{ steps.organize.outputs.is_multi }}"
          
          echo "=============================================="
          echo "🎉 عملیات با موفقیت انجام شد!"
          if [[ "$IS_MULTI" == "true" ]]; then
            echo "📁 فایل‌ها در پوشه ${FOLDER}/"
          else
            echo "📄 فایل در ریشه مخزن (${ARCHIVE_BASE}.7z)"
          fi
          echo "=============================================="
